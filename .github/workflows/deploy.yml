name: Deploy to Yandex Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Yandex Cloud Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_KEY }}
          AWS_DEFAULT_REGION: ru-central1
        run: |
          EP="--endpoint-url https://storage.yandexcloud.net"
          BUCKET="s3://portfolio.clodd.ru"

          # JS files — must be application/javascript for browsers to execute
          aws s3 sync out/ $BUCKET $EP --delete --no-progress \
            --exclude "*" --include "*.js" \
            --content-type "application/javascript"

          # CSS files
          aws s3 sync out/ $BUCKET $EP --no-progress \
            --exclude "*" --include "*.css" \
            --content-type "text/css"

          # HTML files
          aws s3 sync out/ $BUCKET $EP --no-progress \
            --exclude "*" --include "*.html" \
            --content-type "text/html; charset=utf-8"

          # JSON files
          aws s3 sync out/ $BUCKET $EP --no-progress \
            --exclude "*" --include "*.json" \
            --content-type "application/json"

          # Everything else (images, fonts, etc.)
          aws s3 sync out/ $BUCKET $EP --no-progress \
            --exclude "*.js" --exclude "*.css" --exclude "*.html" --exclude "*.json"
